<svg xmlns="http://www.w3.org/2000/svg" width="860" height="400" viewBox="0 0 860 400">
  <defs><style>text{font-family:Arial,sans-serif;} .nav{font-size:13px;fill:#333;} .lbl{font-size:12px;fill:#333;font-weight:bold;} .sub{font-size:12px;fill:#666;} .muted{font-size:11px;fill:#888;}</style></defs>
  <rect width="860" height="400" fill="#fff" stroke="#ddd"/>
  <!-- Nav -->
  <rect x="0" y="0" width="860" height="44" fill="#eee" stroke="#ccc"/>
  <text x="16" y="26" class="nav" font-weight="bold" fill="#5D3A9B">KwaCart</text>
  <text x="140" y="26" class="nav">About</text>
  <text x="200" y="26" class="nav">Accessibility</text>
  <text x="700" y="26" class="nav" font-weight="bold">Log in</text>
  <rect x="750" y="12" width="90" height="20" rx="10" fill="#5D3A9B"/>
  <text x="795" y="25" text-anchor="middle" font-size="11" fill="#fff">Register now</text>
  <!-- Form card -->
  <rect x="280" y="62" width="300" height="278" rx="10" fill="#fff" stroke="#e2e8f0"/>
  <text x="430" y="96" text-anchor="middle" font-size="18" fill="#5D3A9B" font-weight="bold">KwaCart</text>
  <text x="430" y="116" text-anchor="middle" font-size="15" fill="#1a1a1a" font-weight="bold">Welcome back</text>
  <text x="430" y="132" text-anchor="middle" class="sub">Log in to access your tools and archive.</text>
  <!-- Email -->
  <text x="300" y="156" class="lbl">Email address</text>
  <rect x="300" y="162" width="260" height="30" rx="5" fill="#fff" stroke="#5D3A9B" stroke-width="2"/>
  <!-- Password -->
  <text x="300" y="207" class="lbl">Password</text>
  <rect x="300" y="213" width="260" height="30" rx="5" fill="#fff" stroke="#ddd"/>
  <!-- Submit -->
  <rect x="300" y="258" width="260" height="34" rx="6" fill="#5D3A9B"/>
  <text x="430" y="279" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">Log in</text>
  <text x="430" y="320" text-anchor="middle" class="muted">Don't have an account? <tspan fill="#5D3A9B">Register now</tspan></text>
  <!-- Footer -->
  <rect x="0" y="372" width="860" height="28" fill="#f8f8f8" stroke="#eee"/>
  <text x="430" y="389" text-anchor="middle" font-size="11" fill="#888">KwaCart — a Liberating Structures facilitation platform.</text>
</svg>
