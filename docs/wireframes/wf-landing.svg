  <text x="40" y="208" class="h2">About this toolkit</text>
  <text x="40" y="226" class="sub">Hi, my name is John. I want to help grow the performance of teams…</text>
  <text x="40" y="242" class="muted">What all these had in common: we made an impact when we worked together on goals and problems.</text>
  <text x="40" y="260" class="muted">KwaCart is how I bring that process to your screen — 23 Liberating Structures, structured and timed.</text>
  <!-- Use cases -->
  <text x="40" y="302" class="h2">Use this toolkit when…</text>
  <rect x="40"  y="312" width="180" height="54" rx="6" fill="#f8f8f8" stroke="#ddd"/>
  <text x="54"  y="332" class="sub" font-weight="bold">Person-centred plans</text>
  <text x="54"  y="348" class="muted">Surface what matters most to the individual</text>
  <rect x="234" y="312" width="180" height="54" rx="6" fill="#f8f8f8" stroke="#ddd"/>
  <text x="248" y="332" class="sub" font-weight="bold">Learning plans</text>
  <text x="248" y="348" class="muted">Co-create goals with learners and families</text>
  <rect x="428" y="312" width="180" height="54" rx="6" fill="#f8f8f8" stroke="#ddd"/>
  <text x="442" y="332" class="sub" font-weight="bold">Positive behaviour</text>
  <text x="442" y="348" class="muted">Build shared strategies with everyone's voice</text>
  <rect x="622" y="312" width="180" height="54" rx="6" fill="#f8f8f8" stroke="#ddd"/>
  <text x="636" y="332" class="sub" font-weight="bold">Communication plans</text>
  <text x="636" y="348" class="muted">Structure the conversation around the person</text>
