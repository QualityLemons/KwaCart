<svg xmlns="http://www.w3.org/2000/svg" width="860" height="540" viewBox="0 0 860 540">
  <defs><style>text{font-family:Arial,sans-serif;} .nav{font-size:13px;fill:#333;} .h1{font-size:20px;fill:#1a1a1a;font-weight:bold;} .h2{font-size:15px;fill:#1a1a1a;font-weight:bold;} .sub{font-size:12px;fill:#666;} .btn{font-size:11px;} .muted{font-size:11px;fill:#888;} .wf{font-size:11px;fill:#aaa;font-style:italic;}</style></defs>
  <rect width="860" height="540" fill="#fff" stroke="#ddd"/>
