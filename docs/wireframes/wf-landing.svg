  <rect x="40"  y="408" width="374" height="70" rx="6" fill="#f5f3ff" stroke="#c4b5fd"/>
  <text x="56"  y="428" class="sub" font-weight="bold" fill="#5D3A9B">Min Specs</text>
  <text x="56"  y="444" class="muted">Strip rules down to the bone. What must stay?</text>
  <rect x="56"  y="455" width="80" height="18" rx="4" fill="#5D3A9B"/>
