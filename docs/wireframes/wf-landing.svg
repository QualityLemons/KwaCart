  <text x="430" y="90" text-anchor="middle" class="h1" font-size="22">Facilitation that releases what groups already know</text>
  <text x="430" y="112" text-anchor="middle" class="sub">KwaCart brings Liberating Structures to your browser. Run timed, structured sessions — or try two tools free.</text>
  <rect x="230" y="126" width="110" height="28" rx="14" fill="#5D3A9B"/>
