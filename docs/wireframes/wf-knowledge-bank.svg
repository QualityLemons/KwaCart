<svg xmlns="http://www.w3.org/2000/svg" width="860" height="480" viewBox="0 0 860 480">
  <defs><style>text{font-family:Arial,sans-serif;} .nav{font-size:13px;fill:#333;} .h1{font-size:18px;fill:#1a1a1a;font-weight:bold;} .sub{font-size:12px;fill:#555;} .muted{font-size:11px;fill:#888;} .card-ttl{font-size:13px;fill:#1e293b;font-weight:600;} .card-tag{font-size:10px;} .badge{font-size:10px;}</style></defs>
  <rect width="860" height="480" fill="#fff" stroke="#ddd"/>
  <!-- Nav -->
  <rect x="0" y="0" width="860" height="44" fill="#eee" stroke="#ccc"/>
  <text x="16" y="26" class="nav" font-weight="bold" fill="#5D3A9B">KwaCart</text>
  <text x="110" y="26" class="nav">Work Solo</text>
  <text x="205" y="26" class="nav">Facilitate</text>
  <text x="295" y="26" class="nav">Find a Pathway</text>
  <text x="400" y="26" class="nav" font-weight="bold" fill="#5D3A9B">Knowledge Bank</text>
  <text x="560" y="26" class="nav" fill="#aaa">user@example.com</text>
  <rect x="740" y="12" width="55" height="20" rx="3" fill="#ddd" stroke="#bbb"/>
  <text x="767" y="25" text-anchor="middle" font-size="11" fill="#444">Logout</text>
  <!-- Heading -->
  <text x="40" y="76" class="h1">Knowledge Bank</text>
  <text x="220" y="76" class="muted" fill="#94a3b8">5 tools used</text>
  <text x="40" y="94" class="sub">Every tool you've run — click one to see your submissions and sessions.</text>
  <!-- Card row 1 -->
  <!-- Card 1 -->
  <rect x="40"  y="108" width="250" height="90" rx="10" fill="#fff" stroke="#e2e8f0"/>
  <text x="56"  y="130" class="card-ttl">1-2-4-All</text>
  <text x="56"  y="147" class="muted">Turn any question into group insight.</text>
  <rect x="56"  y="160" width="90" height="18" rx="9" fill="#f1f5f9"/>
  <text x="101" y="173" text-anchor="middle" class="badge" fill="#475569">2 solo submissions</text>
  <rect x="156" y="160" width="70" height="18" rx="9" fill="#ede9fe"/>
  <text x="191" y="173" text-anchor="middle" class="badge" fill="#5b21b6">1 session</text>
  <!-- Card 2 -->
  <rect x="306" y="108" width="250" height="90" rx="10" fill="#fff" stroke="#e2e8f0"/>
  <text x="322" y="130" class="card-ttl">Min Specs</text>
  <text x="322" y="147" class="muted">Strip rules down to the bone.</text>
  <rect x="322" y="160" width="90" height="18" rx="9" fill="#f1f5f9"/>
  <text x="367" y="173" text-anchor="middle" class="badge" fill="#475569">3 solo submissions</text>
  <!-- Card 3 -->
  <rect x="572" y="108" width="248" height="90" rx="10" fill="#fff" stroke="#e2e8f0"/>
  <text x="588" y="130" class="card-ttl">Nine Whys</text>
  <text x="588" y="147" class="muted">Ask "why?" nine times to find purpose.</text>
  <rect x="588" y="160" width="90" height="18" rx="9" fill="#f1f5f9"/>
  <text x="633" y="173" text-anchor="middle" class="badge" fill="#475569">1 solo submission</text>
  <rect x="688" y="160" width="70" height="18" rx="9" fill="#ede9fe"/>
  <text x="723" y="173" text-anchor="middle" class="badge" fill="#5b21b6">2 sessions</text>
  <!-- Card row 2 -->
  <rect x="40"  y="212" width="250" height="90" rx="10" fill="#fff" stroke="#e2e8f0"/>
  <text x="56"  y="234" class="card-ttl">15% Solutions</text>
  <text x="56"  y="251" class="muted">What can you start right now?</text>
  <rect x="56"  y="264" width="90" height="18" rx="9" fill="#f1f5f9"/>
  <text x="101" y="277" text-anchor="middle" class="badge" fill="#475569">1 solo submission</text>
  <rect x="306" y="212" width="250" height="90" rx="10" fill="#fff" stroke="#e2e8f0"/>
  <text x="322" y="234" class="card-ttl">Wicked Questions</text>
  <text x="322" y="251" class="muted">Name the paradoxes your group navigates.</text>
  <rect x="322" y="264" width="70" height="18" rx="9" fill="#ede9fe"/>
  <text x="357" y="277" text-anchor="middle" class="badge" fill="#5b21b6">1 session</text>
  <!-- Empty-state hint -->
  <rect x="572" y="212" width="248" height="90" rx="10" fill="#fafafa" stroke="#e2e8f0" stroke-dasharray="6,3"/>
  <text x="696" y="262" text-anchor="middle" class="muted">Use more tools to</text>
  <text x="696" y="278" text-anchor="middle" class="muted">grow your bank →</text>
  <!-- Back link -->
  <text x="40" y="326" class="muted" fill="#5D3A9B">← Back to archive dashboard</text>
  <!-- Footer -->
  <rect x="0" y="452" width="860" height="28" fill="#f8f8f8" stroke="#eee"/>
  <text x="430" y="469" text-anchor="middle" font-size="11" fill="#888">KwaCart — a Liberating Structures facilitation platform.</text>
</svg>
