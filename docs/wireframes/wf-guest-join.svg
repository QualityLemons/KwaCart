<svg xmlns="http://www.w3.org/2000/svg" width="860" height="380" viewBox="0 0 860 380">
  <defs><style>text{font-family:Arial,sans-serif;} .nav{font-size:13px;fill:#333;} .lbl{font-size:12px;fill:#333;font-weight:bold;} .sub{font-size:12px;fill:#666;} .muted{font-size:11px;fill:#888;}</style></defs>
  <rect width="860" height="380" fill="#fff" stroke="#ddd"/>
  <!-- Minimal nav (no full menu — participant-focused) -->
  <rect x="0" y="0" width="860" height="44" fill="#eee" stroke="#ccc"/>
  <text x="16" y="26" class="nav" font-weight="bold" fill="#5D3A9B">KwaCart</text>
  <text x="430" y="26" text-anchor="middle" class="nav" fill="#888">Joining session…</text>
  <!-- Card -->
  <rect x="250" y="66" width="360" height="264" rx="10" fill="#fff" stroke="#e2e8f0"/>
  <text x="430" y="104" text-anchor="middle" font-size="18" fill="#1a1a1a" font-weight="bold">Join this session</text>
  <text x="430" y="122" text-anchor="middle" class="sub">No account needed — just enter your name.</text>
  <!-- Tool badge -->
  <rect x="330" y="132" width="200" height="24" rx="12" fill="#ede9fe"/>
  <text x="430" y="148" text-anchor="middle" font-size="11" fill="#5D3A9B" font-weight="bold">Min Specs — Live session</text>
  <!-- Name field -->
  <text x="272" y="176" class="lbl">Your name</text>
  <rect x="272" y="182" width="316" height="36" rx="5" fill="#fff" stroke="#5D3A9B" stroke-width="2"/>
  <text x="290" y="205" class="muted">e.g. Sarah, Sam, Dr Jones…</text>
  <!-- Submit -->
  <rect x="272" y="232" width="316" height="36" rx="6" fill="#5D3A9B"/>
  <text x="430" y="254" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">Join session →</text>
  <text x="430" y="294" text-anchor="middle" class="muted">Already have an account? <tspan fill="#5D3A9B">Log in instead</tspan></text>
  <!-- Footer -->
  <rect x="0" y="352" width="860" height="28" fill="#f8f8f8" stroke="#eee"/>
  <text x="430" y="369" text-anchor="middle" font-size="11" fill="#888">KwaCart — a Liberating Structures facilitation platform.</text>
</svg>
