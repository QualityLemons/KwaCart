<svg xmlns="http://www.w3.org/2000/svg" width="860" height="520" viewBox="0 0 860 520">
  <defs><style>text{font-family:Arial,sans-serif;} .nav{font-size:13px;fill:#333;} .h1{font-size:20px;fill:#1a1a1a;font-weight:bold;} .h2{font-size:14px;fill:#1a1a1a;font-weight:bold;} .sub{font-size:12px;fill:#555;} .muted{font-size:11px;fill:#888;} .tag{font-size:10px;}</style></defs>
  <rect width="860" height="520" fill="#fff" stroke="#ddd"/>
  <!-- Nav -->
  <rect x="0" y="0" width="860" height="44" fill="#eee" stroke="#ccc"/>
  <text x="16" y="26" class="nav" font-weight="bold" fill="#5D3A9B">KwaCart</text>
  <text x="140" y="26" class="nav">About</text>
  <text x="200" y="26" class="nav" font-weight="bold">Accessibility</text>
  <text x="700" y="26" class="nav">Log in</text>
  <rect x="750" y="12" width="90" height="20" rx="10" fill="#5D3A9B"/>
  <text x="795" y="25" text-anchor="middle" font-size="11" fill="#fff">Register now</text>
  <!-- Display options bar -->
  <rect x="0" y="44" width="860" height="36" fill="#f5f3ff" stroke="#c4b5fd"/>
  <text x="20" y="66" class="muted" font-weight="bold">Display options:</text>
  <rect x="150" y="52" width="130" height="22" rx="5" fill="#5D3A9B"/>
  <text x="215" y="67" text-anchor="middle" font-size="11" fill="#fff">Easy-read version</text>
  <rect x="292" y="52" width="140" height="22" rx="5" fill="#fff" stroke="#5D3A9B"/>
  <text x="362" y="67" text-anchor="middle" font-size="11" fill="#5D3A9B">Accessibility Mode</text>
  <!-- Hero -->
  <rect x="0" y="80" width="860" height="110" fill="#f5f3ff"/>
  <circle cx="430" cy="108" r="20" fill="#5D3A9B" opacity="0.15"/>
  <text x="430" y="113" text-anchor="middle" font-size="16" fill="#5D3A9B">♿</text>
  <text x="430" y="142" text-anchor="middle" class="h1">KwaCart works for everyone</text>
  <text x="430" y="162" text-anchor="middle" class="sub">Built for eye-gaze trackers, switch-scanning users, and AAC communicators.</text>
  <text x="430" y="178" text-anchor="middle" class="muted">Full participation — no adaptations required.</text>
  <!-- Feature cards -->
  <text x="40" y="214" class="h2">Accessibility features</text>
  <rect x="40"  y="224" width="240" height="80" rx="8" fill="#fff" stroke="#e2e8f0"/>
  <text x="56"  y="248" class="h2" fill="#5D3A9B">Calm timer</text>
  <text x="56"  y="264" class="muted">Replaces ticking digits with a</text>
  <text x="56"  y="278" class="muted">colour block: green → amber → red.</text>
  <rect x="300" y="224" width="240" height="80" rx="8" fill="#fff" stroke="#e2e8f0"/>
  <text x="316" y="248" class="h2" fill="#5D3A9B">Composition flag</text>
  <text x="316" y="264" class="muted">Host sees "✏ Composing…" when an</text>
  <text x="316" y="278" class="muted">AAC user is mid-composition.</text>
  <rect x="560" y="224" width="260" height="80" rx="8" fill="#fff" stroke="#e2e8f0"/>
  <text x="576" y="248" class="h2" fill="#5D3A9B">Large touch targets</text>
  <text x="576" y="264" class="muted">80×80 px minimum targets with</text>
  <text x="576" y="278" class="muted">24 px clear padding in AAC mode.</text>
  <!-- Standards -->
  <text x="40" y="334" class="h2">Standards and commitments</text>
  <rect x="40" y="344" width="780" height="60" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="56" y="366" class="sub">WCAG 2.1 AA colour contrast · Keyboard navigation · ARIA live regions · Skip-to-content link</text>
  <text x="56" y="386" class="muted">All interactive elements are reachable by keyboard alone. Screen readers receive live announcements for timer changes, saves, and session events.</text>
  <!-- AAC mode demo -->
  <text x="40" y="432" class="h2">AAC Mode — layout freeze</text>
  <rect x="40" y="442" width="780" height="52" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="56" y="462" class="sub">When AAC Mode is on: no floating banners, no layout reflow, no pop-up notices. The page is fully static</text>
  <text x="56" y="480" class="muted">until the participant dismisses it. Zero-motion CSS transitions apply throughout.</text>
  <!-- Footer -->
  <rect x="0" y="492" width="860" height="28" fill="#f8f8f8" stroke="#eee"/>
  <text x="430" y="509" text-anchor="middle" font-size="11" fill="#888">KwaCart — a Liberating Structures facilitation platform.</text>
</svg>
