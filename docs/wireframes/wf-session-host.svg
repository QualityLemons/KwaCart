<svg xmlns="http://www.w3.org/2000/svg" width="860" height="700" viewBox="0 0 860 700">
  <defs>
    <style>
      text { font-family: Arial, sans-serif; }
      .nav-item  { font-size: 13px; fill: #333; }
      .heading   { font-size: 18px; fill: #1a1a1a; font-weight: bold; }
      .sub       { font-size: 12px; fill: #666; }
      .sec-lbl   { font-size: 12px; fill: #555; font-weight: bold; }
      .body-txt  { font-size: 12px; fill: #333; }
      .muted     { font-size: 11px; fill: #888; }
      .btn-txt   { font-size: 11px; }
      .mono      { font-family: monospace; font-size: 26px; fill: #2a4d69; font-weight: bold; }
      .wf-label  { font-size: 11px; fill: #aaa; font-style: italic; }
    </style>
  </defs>

  <rect width="860" height="700" fill="#fff" stroke="#ddd"/>

  <!-- ── Nav bar ── -->
  <rect x="0" y="0" width="860" height="44" fill="#eeeeee" stroke="#cccccc"/>
  <text x="16" y="26" class="nav-item" font-weight="bold" fill="#5D3A9B">KwaCart</text>
  <text x="110" y="26" class="nav-item" fill="#40B0A6">Work Solo</text>
  <text x="205" y="26" class="nav-item">Facilitate</text>
  <text x="295" y="26" class="nav-item">My Archive</text>
  <text x="490" y="26" class="nav-item" fill="#aaa">host@example.com</text>
  <rect x="680" y="12" width="55" height="20" rx="3" fill="#ddd" stroke="#bbb"/>
  <text x="707" y="25" text-anchor="middle" class="btn-txt" fill="#444">Logout</text>
  <rect x="744" y="12" width="100" height="20" rx="3" fill="#ddd" stroke="#bbb"/>
  <text x="794" y="25" text-anchor="middle" class="btn-txt" fill="#444">Accessibility Mode</text>

  <!-- ── Page heading ── -->
  <text x="30" y="68" class="heading">1-2-4-All</text>
  <text x="174" y="68" font-size="18" fill="#888"> — live session</text>
  <text x="30" y="84" class="sub">You are the host. Share the link or QR code to invite participants.</text>

  <!-- ── Share panel ── -->
  <rect x="30" y="95" width="800" height="90" rx="5" fill="#f8f8f8" stroke="#ccc"/>
  <!-- Signed-in link -->
  <text x="46" y="116" class="sec-lbl">Signed-in participants</text>
  <rect x="46" y="124" width="360" height="20" rx="3" fill="#eeeeee" stroke="#ccc"/>
  <text x="54" y="138" class="muted">https://kwacart.app/tools/session/abc123/join/</text>
  <rect x="418" y="124" width="66" height="20" rx="3" fill="#ddd" stroke="#bbb"/>
  <text x="451" y="138" text-anchor="middle" class="btn-txt" fill="#444">Copy link</text>
  <!-- QR code area -->
  <text x="530" y="116" class="sec-lbl">Guest (QR code — no account needed)</text>
  <rect x="530" y="124" width="52" height="52" rx="3" fill="#fff" stroke="#999"/>
  <!-- Simple QR placeholder cross-hatch -->
  <line x1="530" y1="124" x2="582" y2="176" stroke="#ccc" stroke-width="1"/>
  <line x1="582" y1="124" x2="530" y2="176" stroke="#ccc" stroke-width="1"/>
  <text x="556" y="153" text-anchor="middle" font-size="9" fill="#aaa">QR</text>
  <text x="592" y="145" class="muted">Scan to join without</text>
  <text x="592" y="160" class="muted">creating an account.</text>

  <!-- ── Timer ── -->
  <rect x="30" y="196" width="800" height="46" rx="5" fill="#f8f8f8" stroke="#ccc"/>
  <!-- Phase label -->
  <text x="46" y="213" class="muted">SUGGESTED TIME</text>
  <text x="46" y="228" class="body-txt" font-weight="bold">Round 1 — individual (1 min)</text>
  <!-- Countdown -->
  <text x="580" y="230" class="mono">04:35</text>
  <!-- Controls -->
  <rect x="680" y="208" width="55" height="22" rx="3" fill="#E66100" stroke="#c44f00"/>
  <text x="707" y="223" text-anchor="middle" font-size="11" fill="#fff">Pause</text>
  <rect x="744" y="208" width="55" height="22" rx="3" fill="#ddd" stroke="#bbb"/>
  <text x="771" y="223" text-anchor="middle" class="btn-txt" fill="#444">Reset</text>
  <!-- Progress bar -->
  <rect x="30" y="238" width="800" height="4" rx="2" fill="#e2e8f0"/>
  <rect x="30" y="238" width="300" height="4" rx="2" fill="#5D3A9B"/>

  <!-- ── Info box (collapsed) ── -->
  <rect x="30" y="254" width="800" height="28" rx="5" fill="#f8f8f8" stroke="#ccc"/>
  <text x="46" y="272" class="body-txt" fill="#5D3A9B">▶  How to use 1-2-4-All</text>

  <!-- ── Your response heading ── -->
  <text x="30" y="302" class="heading" font-size="15">Your response</text>

  <!-- ── Form fields ── -->
  <!-- Field 1 -->
  <text x="30" y="322" class="sec-lbl">Round 1 — your individual response (1 min, alone):</text>
  <rect x="30" y="330" width="800" height="70" rx="4" fill="#fff" stroke="#cbd5e1"/>
  <text x="46" y="350" class="muted">What is your response to the challenge?</text>

  <!-- ── Save button ── -->
  <rect x="30" y="412" width="130" height="28" rx="4" fill="#5D3A9B" stroke="#4a2e7d"/>
  <text x="95" y="430" text-anchor="middle" font-size="12" fill="#fff">Save my response</text>
  <text x="174" y="430" class="muted">  Autosaved 2 s ago</text>

  <!-- ── Participants ── -->
  <text x="30" y="460" class="sec-lbl">Participants — 3 joined</text>
  <rect x="30"  y="468" width="120" height="26" rx="13" fill="#e6f7f6" stroke="#40B0A6"/>
  <text x="90"  y="485" text-anchor="middle" font-size="11" fill="#267a74">Alice (you — host)</text>
  <rect x="162" y="468" width="70" height="26" rx="13" fill="#f8f8f8" stroke="#ccc"/>
  <text x="197" y="485" text-anchor="middle" font-size="11" fill="#333">Bob</text>
  <rect x="244" y="468" width="95" height="26" rx="13" fill="#fffbeb" stroke="#fcd34d"/>
  <text x="291" y="485" text-anchor="middle" font-size="11" fill="#92400e">Carol (guest)</text>

  <!-- ── Host controls panel ── -->
  <rect x="30" y="510" width="800" height="158" rx="6" fill="#f8f8f8" stroke="#ccc"/>
  <text x="46" y="530" class="sec-lbl">Host controls</text>

  <!-- Pause reminder -->
  <rect x="46" y="538" width="240" height="58" rx="4" fill="#fff" stroke="#e2e8f0"/>
  <text x="58" y="555" class="muted">Pause reminder threshold</text>
  <rect x="58" y="562" width="120" height="20" rx="3" fill="#eeeeee" stroke="#ccc"/>
  <text x="118" y="576" text-anchor="middle" class="muted">5 minutes ▾</text>
  <rect x="186" y="562" width="50" height="20" rx="3" fill="#ddd" stroke="#bbb"/>
  <text x="211" y="576" text-anchor="middle" class="btn-txt" fill="#444">Save</text>

  <!-- Inclusive pacing -->
  <rect x="304" y="538" width="240" height="58" rx="4" fill="#fff" stroke="#e2e8f0"/>
  <text x="316" y="555" class="muted">Inclusive Pacing (AAC support)</text>
  <rect x="316" y="562" width="20" height="20" rx="3" fill="#eeeeee" stroke="#999"/>
  <text x="342" y="576" class="muted" font-size="11">Enable  ×3 / ×5 multiplier</text>

  <!-- Verbal breakout -->
  <rect x="562" y="538" width="240" height="58" rx="4" fill="#fff" stroke="#e2e8f0"/>
  <text x="574" y="555" class="muted">Verbal Breakout (sub-feature of IP)</text>
  <rect x="574" y="562" width="140" height="20" rx="3" fill="#ddd" stroke="#bbb"/>
  <text x="644" y="576" text-anchor="middle" class="btn-txt" fill="#444">Start verbal discussion</text>

  <!-- Close session button -->
  <rect x="46" y="614" width="130" height="28" rx="4" fill="#dc2626" stroke="#b91c1c"/>
  <text x="111" y="632" text-anchor="middle" font-size="12" fill="#fff">Close session</text>
  <text x="188" y="632" class="muted" font-size="11">Locks responses and generates the combined export.</text>

  <!-- Wireframe label -->
  <text x="430" y="690" text-anchor="middle" class="wf-label">Wireframe — Live Session: Host View (/tools/session/&lt;id&gt;/)</text>
</svg>
