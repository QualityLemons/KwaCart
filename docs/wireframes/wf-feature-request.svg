<svg xmlns="http://www.w3.org/2000/svg" width="860" height="460" viewBox="0 0 860 460">
  <defs><style>text{font-family:Arial,sans-serif;} .nav{font-size:13px;fill:#333;} .lbl{font-size:12px;fill:#333;font-weight:bold;} .sub{font-size:12px;fill:#666;} .muted{font-size:11px;fill:#888;}</style></defs>
  <rect width="860" height="460" fill="#fff" stroke="#ddd"/>
  <!-- Nav -->
  <rect x="0" y="0" width="860" height="44" fill="#eee" stroke="#ccc"/>
  <text x="16" y="26" class="nav" font-weight="bold" fill="#5D3A9B">KwaCart</text>
  <text x="140" y="26" class="nav">About</text>
  <text x="200" y="26" class="nav">Accessibility</text>
  <text x="700" y="26" class="nav">Log in</text>
  <rect x="750" y="12" width="90" height="20" rx="10" fill="#5D3A9B"/>
  <text x="795" y="25" text-anchor="middle" font-size="11" fill="#fff">Register now</text>
  <!-- Content -->
  <text x="40" y="82" font-size="20" fill="#1a1a1a" font-weight="bold">Request a feature</text>
  <text x="40" y="100" class="sub">Got an idea for a new tool or platform improvement? We'd love to hear it.</text>
  <!-- Name -->
  <text x="40" y="130" class="lbl">Your name</text>
  <rect x="40" y="136" width="380" height="30" rx="5" fill="#fff" stroke="#ddd"/>
  <!-- Email -->
  <text x="440" y="130" class="lbl">Your email</text>
  <rect x="440" y="136" width="380" height="30" rx="5" fill="#fff" stroke="#ddd"/>
  <!-- Title -->
  <text x="40" y="184" class="lbl">Feature title</text>
  <rect x="40" y="190" width="780" height="30" rx="5" fill="#fff" stroke="#5D3A9B" stroke-width="2"/>
  <text x="56" y="210" class="muted">Give your idea a short descriptive title…</text>
  <!-- Description -->
  <text x="40" y="238" class="lbl">Description</text>
  <rect x="40" y="244" width="780" height="120" rx="5" fill="#fff" stroke="#ddd"/>
  <text x="56" y="270" class="muted">Describe what you'd like to see and why it would be useful…</text>
  <!-- Submit -->
  <rect x="40" y="378" width="180" height="34" rx="6" fill="#5D3A9B"/>
  <text x="130" y="399" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">Submit request</text>
  <!-- Footer -->
  <rect x="0" y="432" width="860" height="28" fill="#f8f8f8" stroke="#eee"/>
  <text x="430" y="449" text-anchor="middle" font-size="11" fill="#888">KwaCart — a Liberating Structures facilitation platform.</text>
</svg>
