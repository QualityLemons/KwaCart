<svg xmlns="http://www.w3.org/2000/svg" width="860" height="400" viewBox="0 0 860 400">
  <defs><style>text{font-family:Arial,sans-serif;} .nav{font-size:13px;fill:#333;} .lbl{font-size:12px;fill:#333;font-weight:bold;} .sub{font-size:12px;fill:#666;} .muted{font-size:11px;fill:#888;}</style></defs>
  <rect width="860" height="400" fill="#fff" stroke="#ddd"/>
  <!-- Nav -->
  <rect x="0" y="0" width="860" height="44" fill="#eee" stroke="#ccc"/>
  <text x="16" y="26" class="nav" font-weight="bold" fill="#5D3A9B">KwaCart</text>
  <text x="140" y="26" class="nav">About</text>
  <text x="200" y="26" class="nav">Accessibility</text>
  <text x="700" y="26" class="nav">Log in</text>
  <rect x="750" y="12" width="90" height="20" rx="10" fill="#5D3A9B"/>
  <text x="795" y="25" text-anchor="middle" font-size="11" fill="#fff">Register now</text>
  <!-- Content -->
  <rect x="240" y="62" width="380" height="288" rx="10" fill="#fff" stroke="#e2e8f0"/>
  <text x="430" y="100" text-anchor="middle" font-size="18" fill="#1a1a1a" font-weight="bold">Join the waiting list</text>
  <text x="430" y="118" text-anchor="middle" class="sub">Be the first to know when KwaCart opens more widely.</text>
  <!-- Name -->
  <text x="262" y="146" class="lbl">Name <tspan fill="#888" font-weight="normal">(optional)</tspan></text>
  <rect x="262" y="152" width="336" height="30" rx="5" fill="#fff" stroke="#ddd"/>
  <!-- Email -->
  <text x="262" y="198" class="lbl">Email address</text>
  <rect x="262" y="204" width="336" height="30" rx="5" fill="#fff" stroke="#5D3A9B" stroke-width="2"/>
  <!-- Submit -->
  <rect x="262" y="250" width="336" height="34" rx="6" fill="#5D3A9B"/>
  <text x="430" y="271" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">Join the waiting list</text>
  <text x="430" y="316" text-anchor="middle" class="muted">Already signed up? You'll hear from us.</text>
  <!-- Footer -->
  <rect x="0" y="372" width="860" height="28" fill="#f8f8f8" stroke="#eee"/>
  <text x="430" y="389" text-anchor="middle" font-size="11" fill="#888">KwaCart — a Liberating Structures facilitation platform.</text>
</svg>
