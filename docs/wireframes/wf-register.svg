<svg xmlns="http://www.w3.org/2000/svg" width="860" height="420" viewBox="0 0 860 420">
  <defs><style>text{font-family:Arial,sans-serif;} .nav{font-size:13px;fill:#333;} .lbl{font-size:12px;fill:#333;font-weight:bold;} .sub{font-size:12px;fill:#666;} .muted{font-size:11px;fill:#888;}</style></defs>
  <rect width="860" height="420" fill="#fff" stroke="#ddd"/>
  <!-- Nav -->
  <rect x="0" y="0" width="860" height="44" fill="#eee" stroke="#ccc"/>
  <text x="16" y="26" class="nav" font-weight="bold" fill="#5D3A9B">KwaCart</text>
  <text x="140" y="26" class="nav">About</text>
  <text x="200" y="26" class="nav">Accessibility</text>
  <text x="700" y="26" class="nav">Log in</text>
  <rect x="750" y="12" width="90" height="20" rx="10" fill="#5D3A9B"/>
  <text x="795" y="25" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Register now</text>
  <!-- Form card -->
  <rect x="270" y="68" width="320" height="302" rx="10" fill="#fff" stroke="#e2e8f0" filter="url(#shadow)"/>
  <text x="430" y="102" text-anchor="middle" font-size="18" fill="#5D3A9B" font-weight="bold">KwaCart</text>
  <text x="430" y="122" text-anchor="middle" font-size="15" fill="#1a1a1a" font-weight="bold">Create your account</text>
  <text x="430" y="138" text-anchor="middle" class="sub">Get started with KwaCart today.</text>
  <!-- Email -->
  <text x="290" y="162" class="lbl">Email address</text>
  <rect x="290" y="168" width="280" height="30" rx="5" fill="#fff" stroke="#5D3A9B" stroke-width="2"/>
  <!-- Password -->
  <text x="290" y="214" class="lbl">Password</text>
  <rect x="290" y="220" width="280" height="30" rx="5" fill="#fff" stroke="#ddd"/>
  <!-- Confirm -->
  <text x="290" y="266" class="lbl">Confirm password</text>
  <rect x="290" y="272" width="280" height="30" rx="5" fill="#fff" stroke="#ddd"/>
  <!-- Submit -->
  <rect x="290" y="316" width="280" height="34" rx="6" fill="#5D3A9B"/>
  <text x="430" y="337" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">Register</text>
  <text x="430" y="356" text-anchor="middle" class="muted">Already have an account? <tspan fill="#5D3A9B">Log in</tspan></text>
  <!-- Footer -->
  <rect x="0" y="392" width="860" height="28" fill="#f8f8f8" stroke="#eee"/>
  <text x="430" y="409" text-anchor="middle" font-size="11" fill="#888">KwaCart — a Liberating Structures facilitation platform.</text>
</svg>
